server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          # Trust local proxy headers
          trusted-proxies: ".*"
          # Auto-discover routes from Eureka
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:

            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

            - id: user-service-users
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

            - id: product-service-v1
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

            - id: product-service-v2
              uri: lb://product-service
              predicates:
                - Path=/api/v2/products/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - AddRequestHeader=X-Gateway-Source, quickshop-gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0          # trace 100% of requests locally
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces    # Jaeger OTLP HTTP endpoint
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.quickshop: DEBUG
    org.springframework.cloud.gateway: DEBUG
    com.netflix: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [${spring.application.name}] [traceId=%mdc{traceId:-none}] %logger{36} - %msg%n"