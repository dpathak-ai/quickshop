apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: quickshop
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 31686
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: quickshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: ui
              containerPort: 16686
