apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: quickshop
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - api-gateway:8080

      - job_name: service-registry
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - service-registry:8761

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service:8081

      - job_name: product-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - product-service:8082

      - job_name: inventory-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - inventory-service:8083

      - job_name: order-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - order-service:8084

      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-service:8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: quickshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yaml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yaml
              subPath: prometheus.yaml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: quickshop
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
