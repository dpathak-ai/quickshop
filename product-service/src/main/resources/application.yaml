server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://localhost:3306/quickshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: quickshop
    password: quickshop
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: NEVER
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 60000          # 60 seconds default TTL
      cache-null-values: false     # don't cache null results


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0          # trace 100% of requests locally
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces    # Jaeger OTLP HTTP endpoint
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.dp.product_service: DEBUG
    org.springframework.cache: DEBUG    # shows cache HIT/MISS
    org.springframework.data.redis: DEBUG
    com.netflix: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [${spring.application.name}] [traceId=%X{traceId:-none}] %logger{36} - %msg%n"

