server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/quickshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: quickshop
    password: quickshop
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      format_sql: true
      properties:
        hibernate.dialect: org.hibernate.dialect.MySQL5Dialect
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0          # trace 100% of requests locally
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces    # Jaeger OTLP HTTP endpoint
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}     # tag every metric with service name


logging:
  level:
    root: info
    org.springframework: warn
    com.quickshop: debug
    io.opentelemetry: DEBUG
    io.micrometer.tracing: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [traceId=%X{traceId:-none}] [spanId=%X{spanId:-none}] [%thread] %logger{36} - %msg%n"
  file:
      name: logs/user-service.log

app:
  jwt:
    secret: c2VjdXJlLWp3dC1rZXktZm9yLXFxdXlzaG9wLTIwMjYtU2lnbmluZy1LZXktMTIzNDU2Nzg5MA==
    access-token-expiry: 900000
    refresh-token-expiry: 86400000
