server:
  port: 8085

spring:
  application:
    name: notification-service

  # No datasource — stateless service, no DB needed

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual

management:
  tracing:
    sampling:
      probability: 1.0          # trace 100% of requests locally
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces    # Jaeger OTLP HTTP endpoint
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}


logging:
  level:
    root: INFO
    com.quickshop: DEBUG
    org.springframework.kafka: INFO
    com.netflix: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [${spring.application.name}] [traceId=%X{traceId:-none}] %logger{36} - %msg%n"